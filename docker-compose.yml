version: "3.9"

services:
  hotel-booking-postgres:
    image: postgres:18
    container_name: hotel-booking-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotel-booking-db

    ports:
      - "5432:5432"

    volumes:
      - hotel-booking-postgres-data:/var/lib/postgresql

volumes:
  hotel-booking-postgres-data: